<!doctype html>
<html lang="ko">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<title>Dong Dong Spec Viewer</title>
		<!-- 목업 HTML 은 <iframe srcdoc> 으로 격리 렌더 — 렌더 스택 번들 불필요(vendor 제거). -->
		<link rel="stylesheet" href="theme.css" />
	</head>
	<body>
		<header id="topbar">
			<div class="brand">Dong Dong Spec Viewer <span class="badge">Windows · M3</span></div>
			<div id="docpath" class="docpath"></div>
			<div id="actions" class="actions">
				<button id="edit-btn" type="button" disabled title="주석 편집 — 클릭 = 핀 · 드래그 = 박스 (Ctrl+E)">✏ 주석 편집</button>
				<button id="newwin-btn" type="button" title="새 창 — 지금 폴더를 새 창에서 (Ctrl+N)">⧉ 새 창</button>
				<button id="split-btn" type="button" disabled title="분할 — 활성 문서를 옆 열에 (Ctrl+\)">◫ 분할</button>
			</div>
		</header>
		<div id="layout">
			<aside id="sidebar">
				<div class="sb-head">
					<button id="open-folder-btn" type="button">📁 폴더 열기</button>
					<div id="sb-root" class="sb-root"></div>
				</div>
				<section id="vault-section" class="recent-section hidden">
					<div class="recent-head"><span>내 Obsidian 볼트</span></div>
					<ul id="vault-list" class="recent-list"></ul>
				</section>
				<section id="recent-section" class="recent-section hidden">
					<div class="recent-head"><span>최근 파일</span><button id="recent-clear-btn" type="button" title="최근 파일 목록 비우기">초기화</button></div>
					<ul id="recent-list" class="recent-list"></ul>
				</section>
				<nav id="filetree" class="filetree">
					<div class="tree-empty">폴더를 열면 .html 파일이 트리로 표시됩니다.</div>
				</nav>
			</aside>
			<div id="panes" class="panes"></div>
			<aside id="annot-panel" class="annot-panel hidden">
				<div class="ap-head">
					<span class="ap-title">주석 <b id="ap-count">0</b></span>
					<label class="ap-pull" title="끄면 삭제해도 뒤 번호가 안 당겨집니다(자동 번호는 현재 값으로 동결)"><input type="checkbox" id="ap-pullback" checked />삭제 시 당김</label>
				</div>
				<ul id="annot-list" class="annot-list"></ul>
				<div class="ap-hint">편집 모드 — 목업 클릭 = 핀 · 드래그 = 박스 · 핀 드래그 = 이동<br />행 더블클릭 = 번호 수정 · 행 드래그 = 재정렬 · Delete = 삭제<br />화면 이동(goScreen)은 편집을 끄고 하세요.</div>
			</aside>
		</div>
		<div id="drop-overlay" class="drop-overlay hidden"><span>여기에 .md 파일이나 폴더를 놓으세요</span></div>
		<!-- core 순수 모듈(UMD) → 오버레이 → 셸 순서 (오버레이가 DDAnchor·DDModel·DDNumbering, 셸이 DDHtmlIO·DDNumbering·DDOverlay 참조) -->
		<script src="../core/anchor.js"></script>
		<script src="../core/annotation-model.js"></script>
		<script src="../core/numbering.js"></script>
		<script src="../core/html-io.js"></script>
		<script src="overlay.js"></script>
		<script src="renderer.js"></script>
	</body>
</html>
